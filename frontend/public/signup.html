<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - AskMak</title>
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <script src="/js/tailwind-config.js"></script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="font-sans bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen flex items-center justify-center px-5">

  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <img src="/assets/mak_logo.png" alt="Makerere University" class="h-16 w-auto mx-auto mb-3">
      <a href="/" class="text-2xl font-bold tracking-tight text-mak-dark dark:text-white inline-block mb-2">Ask<span class="text-mak-green">Mak</span></a>
      <p class="text-sm text-gray-500 dark:text-gray-400">Create your account</p>
    </div>

    <div class="bg-white dark:bg-gray-900 rounded-xl p-6 shadow-lg shadow-gray-900/8 dark:shadow-black/40">
      <div id="alert" class="hidden"></div>

      <form id="signup-form" class="space-y-4">
        <div class="space-y-1">
          <label for="full_name" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Full name</label>
          <input type="text" name="full_name" id="full_name" placeholder="Odoch Nelson Ochan" required
            class="w-full px-3.5 py-2.5 border border-gray-200 dark:border-gray-700 rounded-lg text-sm bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 placeholder-gray-400 focus:outline-none focus:border-mak-green focus:ring-2 focus:ring-mak-green/10 transition">
        </div>

        <div class="space-y-1">
          <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Email address</label>
          <input type="email" name="email" id="email" placeholder="you@example.com" required
            class="w-full px-3.5 py-2.5 border border-gray-200 dark:border-gray-700 rounded-lg text-sm bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 placeholder-gray-400 focus:outline-none focus:border-mak-green focus:ring-2 focus:ring-mak-green/10 transition">
          <p class="text-mak-red text-xs mt-1 hidden"></p>
        </div>

        <div class="space-y-1">
          <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Password</label>
          <div class="relative">
            <input type="password" name="password" id="password" placeholder="At least 8 characters" required
              class="w-full px-3.5 py-2.5 pr-10 border border-gray-200 dark:border-gray-700 rounded-lg text-sm bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 placeholder-gray-400 focus:outline-none focus:border-mak-green focus:ring-2 focus:ring-mak-green/10 transition">
            <button type="button" class="toggle-password absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition cursor-pointer bg-transparent border-none p-0">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="h-1 rounded-full bg-gray-100 dark:bg-gray-800 mt-2 overflow-hidden">
            <div id="strength-fill" class="h-full rounded-full transition-all duration-300" style="width: 0%"></div>
          </div>
        </div>

        <div class="space-y-1">
          <label for="confirm_password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Confirm password</label>
          <input type="password" name="confirm_password" id="confirm_password" placeholder="Re-enter password" required
            class="w-full px-3.5 py-2.5 border border-gray-200 dark:border-gray-700 rounded-lg text-sm bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 placeholder-gray-400 focus:outline-none focus:border-mak-green focus:ring-2 focus:ring-mak-green/10 transition">
        </div>

        <button type="submit" class="w-full bg-mak-green text-white py-2.5 rounded-lg text-sm font-medium hover:opacity-90 transition cursor-pointer">
          Create account
        </button>
      </form>
    </div>

    <p class="text-center text-sm text-gray-500 dark:text-gray-400 mt-5">
      Already have an account? <a href="/login.html" class="text-mak-green font-medium hover:underline">Sign in</a>
    </p>
  </div>

  <script src="/js/theme.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
  <script>Auth.setupForms();</script>
</body>
</html>
